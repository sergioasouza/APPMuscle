name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next.js types
        run: npx next typegen

      - name: Typecheck
        run: npm exec tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint -- .

      - name: Build
        run: npm run build
